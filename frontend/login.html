<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedicaLy - Login</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="icon" href="assets/bot.png" />
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <img src="assets/logo.png" alt="MedMatch AI" class="logo" />
        <h2>Welcome to MedicaLy</h2>
        <p>Login to continue</p>
      </div>
      
      <div class="login-tabs">
        <button class="tab-btn active" onclick="switchTab('patient')">Patient</button>
        <button class="tab-btn" onclick="switchTab('doctor')">Doctor</button>
      </div>

      <form id="login-form" class="login-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>
        
        <div class="login-actions">
          <label><input type="checkbox" /> Remember me</label>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>
        
        <div id="login-error" class="error-msg" style="display:none; color: #eb2c0a; margin-bottom: 10px; font-size: 14px; text-align: center; background: #ffebee; padding: 10px; border-radius: 8px;"></div>
        
        <button type="submit" class="submit-btn" id="login-submit-btn">Login as Patient</button>
      </form>
      
      <div class="login-footer">
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        <a href="index.html" class="back-link">← Back to Chat</a>
      </div>
    </div>
  </div>

  <script src="notifications.js"></script>
  <script src="login.js?v=2"></script>
</body>
</html>
